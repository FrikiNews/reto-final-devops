server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compresión gzip
    gzip on;
    gzip_types text/html text/css application/javascript application/json;

    # Archivos estáticos con cache corto (desarrollo)
    location ~* \.(css|js|png|jpg|svg|ico|woff2?)$ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # Proxy al backend Flask
    location /api/ {
        proxy_pass         http://backend:5000/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Health-check del backend accesible desde el frontend
    location /health {
        proxy_pass http://backend:5000/health;
    }

    # Todas las rutas sirven index.html (SPA-friendly)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
