version: "3.9"

# ─────────────────────────────────────────────
#  Zenta — Docker Compose (modo desarrollo)
#  Hot-reload activado en los 3 servicios.
#  node_modules viven dentro de los contenedores.
# ─────────────────────────────────────────────

services:

  # ── MongoDB ───────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: zenta_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-zenta}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-zentapass}
      MONGO_INITDB_DATABASE:      ${MONGO_DB:-zenta_db}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend Node.js / Express ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: zenta_backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      PORT:          5000
      MONGODB_URI:   mongodb://${MONGO_USER:-zenta}:${MONGO_PASS:-zentapass}@mongo:27017/${MONGO_DB:-zenta_db}?authSource=admin
      JWT_SECRET:    ${JWT_SECRET:-super_secret_change_in_prod}
      EFIRMA_SECRET: ${EFIRMA_SECRET:-zenta_efirma_aes256_secret_2024_change_in_prod}
      CORS_ORIGIN:   "*"
      NODE_ENV:      development
    ports:
      - "5000:5000"
    volumes:
      - ./backend/src:/app/src      # hot-reload: solo montar el código fuente
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Landing Page (React / Vite dev server) ────────────────────────────────
  landing:
    build:
      context: ./landing
      dockerfile: Dockerfile.dev
    container_name: zenta_landing
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      CHOKIDAR_USEPOLLING: "true"   # necesario para hot-reload en Docker
    ports:
      - "4000:4000"
    volumes:
      - ./landing/src:/app/src      # hot-reload
      - ./landing/index.html:/app/index.html

  # ── Intranet (React / Vite dev server) ────────────────────────────────────
  intranet:
    build:
      context: ./intranet
      dockerfile: Dockerfile.dev
    container_name: zenta_intranet
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      CHOKIDAR_USEPOLLING: "true"   # necesario para hot-reload en Docker
    ports:
      - "4001:4001"
    volumes:
      - ./intranet/src:/app/src     # hot-reload
      - ./intranet/index.html:/app/index.html

# ─────────────────────────────────────────────
#  Volúmenes persistentes
# ─────────────────────────────────────────────
volumes:
  mongo_data:
